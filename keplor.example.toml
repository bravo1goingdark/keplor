# Keplor configuration
# Copy to keplor.toml and edit for your deployment.
# All values shown are the defaults — uncomment to override.
# Every field can also be set via env var: KEPLOR_<SECTION>_<FIELD>
# e.g. KEPLOR_STORAGE_RETENTION_DAYS=30

# ── HTTP listener ────────────────────────────────────────────────────────
[server]
# listen_addr = "0.0.0.0:8080"
# shutdown_timeout_secs = 25       # drain batch writer + WAL checkpoint
# request_timeout_secs = 30        # per-request timeout (408 on expiry)
# max_connections = 10000           # concurrent connection limit

# ── Storage ──────────────────────────────────────────────────────────────
[storage]
db_path = "/var/lib/keplor/keplor.db"   # SQLite database path
# retention_days = 90              # auto-GC events older than this (0 = disabled)
# wal_checkpoint_secs = 300        # WAL checkpoint interval (0 = disabled)
# max_db_size_mb = 0               # max database size in MB (0 = unlimited)
                                    # returns HTTP 507 when exceeded
# read_pool_size = 4               # number of SQLite read connections (1-64)

# ── Authentication ───────────────────────────────────────────────────────
# When empty, all endpoints are open (no auth required).
#
# Simple format: "id:secret" — all keys default to default_tier.
[auth]
# api_keys = [
#     "prod-svc:sk-your-production-key",
#     "dev:sk-your-dev-key",
# ]

# Extended format: explicit tier per key.
# [[auth.api_key_entries]]
# id = "free-user"
# secret = "sk-free-key"
# tier = "free"
#
# [[auth.api_key_entries]]
# id = "pro-user"
# secret = "sk-pro-key"
# tier = "pro"
#
# [[auth.api_key_entries]]
# id = "team-org"
# secret = "sk-team-key"
# tier = "team"

# ── Retention tiers ──────────────────────────────────────────────────────
# Define named tiers with per-tier retention durations.
# API keys are mapped to tiers via [auth] config above.
# GC runs hourly, one pass per tier. 0 days = keep forever.
[retention]
default_tier = "free"

[[retention.tiers]]
name = "free"
days = 7

[[retention.tiers]]
name = "pro"
days = 90

# Uncomment to add more tiers:
# [[retention.tiers]]
# name = "team"
# days = 180
#
# [[retention.tiers]]
# name = "enterprise"
# days = 365

# ── CORS ─────────────────────────────────────────────────────────────────
# Allowed origins for browser requests.
# Empty = same-origin only (restrictive, recommended for production).
# ["*"] = allow all origins (not recommended).
[cors]
# allowed_origins = ["https://your-dashboard.example.com"]

# ── Pipeline ─────────────────────────────────────────────────────────────
[pipeline]
# batch_size = 64                  # max events per batch write
# max_body_bytes = 10485760        # 10 MB max request body

# ── Idempotency ──────────────────────────────────────────────────────────
[idempotency]
# enabled = true
# ttl_secs = 300                   # 5 min TTL for cached responses
# max_entries = 100000             # LRU cache capacity

# ── Rate limiting ────────────────────────────────────────────────────────
[rate_limit]
# enabled = false                  # set true to enable per-key limiting
# requests_per_second = 100.0
# burst = 200

# ── Blob storage (optional, requires --features s3) ──────────────────────
# By default, request/response bodies are stored in the SQLite database.
# Uncomment to offload blob data to an S3-compatible object store
# (Cloudflare R2, MinIO, AWS S3). Metadata stays in SQLite.
# [blob_storage]
# bucket = "keplor-blobs"
# endpoint = "https://<account-id>.r2.cloudflarestorage.com"
# region = "auto"                    # "auto" for R2, "us-east-1" for AWS
# access_key_id = "your-access-key"
# secret_access_key = "your-secret-key"
# prefix = ""                        # optional key prefix (e.g. "blobs/")
# path_style = false                 # true for MinIO

# ── TLS (optional) ───────────────────────────────────────────────────────
# Uncomment to enable HTTPS. Both cert_path and key_path are required.
# [tls]
# cert_path = "/etc/keplor/tls/cert.pem"
# key_path  = "/etc/keplor/tls/key.pem"
