# Keplor configuration
# Copy to keplor.toml and edit for your deployment.
# All values shown are the defaults — uncomment to override.
# Every field can also be set via env var: KEPLOR_<SECTION>_<FIELD>
# e.g. KEPLOR_STORAGE_RETENTION_DAYS=30

# ── HTTP listener ────────────────────────────────────────────────────────
[server]
# listen_addr = "0.0.0.0:8080"
# shutdown_timeout_secs = 25       # drain batch writer + WAL checkpoint
# request_timeout_secs = 30        # per-request timeout (408 on expiry)
# max_connections = 10000           # concurrent connection limit (raise to 65000 for 50K+ users)

# ── Storage ──────────────────────────────────────────────────────────────
# Storage is a KeplorDB data directory — one append-only Engine per
# retention tier under {data_dir}/{tier}/. Old `db_path =` configs are
# still accepted as an alias for `data_dir =` so deployed TOMLs keep
# loading; the value points at a directory now, not a SQLite file.
[storage]
data_dir = "/var/lib/keplor"          # KeplorDB data directory
# retention_days = 90                  # auto-GC events older than this (0 = disabled)
# gc_interval_secs = 3600              # GC sweep cadence (0 = disabled)
# wal_checkpoint_secs = 300            # rotate active WAL into a sealed segment (0 = disabled)
# max_db_size_mb = 0                   # cap data dir size in MB; ingestion returns
                                        # HTTP 507 when exceeded (0 = unlimited)
# wal_max_events = 500000              # events per WAL shard before forced rotation
# wal_sync_interval = 64               # fsync threshold for non-BatchWriter direct writes.
                                        # NOTE: BatchWriter (the default ingest path) now ALWAYS
                                        # fsyncs at the end of each 50 ms flush, so this knob only
                                        # affects callers that bypass BatchWriter. Leave at 64.
# wal_sync_bytes = 262144              # fsync after N buffered bytes (same caveat as above)
# wal_shard_count = 4                  # per-tier WAL shards (raise on >8 cores)
# mmap_cache_capacity = 256            # mmap'd-segment LRU size
# rollup_replay_days = 7               # days of segments replayed into the
                                        # in-memory rollup store on open
# rollup_loop_secs = 60                # cadence of the in-process rollup-refresh loop.
                                        # lower = fresher daily_rollups; higher = less CPU.
                                        # range 5-3600.

# ── Authentication ───────────────────────────────────────────────────────
# When empty, all endpoints are open (no auth required).
#
# Simple format: "id:secret" — all keys default to default_tier.
[auth]
# api_keys = [
#     "prod-svc:sk-your-production-key",
#     "dev:sk-your-dev-key",
# ]

# Extended format: explicit tier per key.
# [[auth.api_key_entries]]
# id = "free-user"
# secret = "sk-free-key"
# tier = "free"
#
# [[auth.api_key_entries]]
# id = "pro-user"
# secret = "sk-pro-key"
# tier = "pro"
#
# [[auth.api_key_entries]]
# id = "team-org"
# secret = "sk-team-key"
# tier = "team"

# ── Retention tiers ──────────────────────────────────────────────────────
# Define named tiers with per-tier retention durations.
# API keys are mapped to tiers via [auth] config above.
# GC runs hourly, one pass per tier. 0 days = keep forever.
[retention]
default_tier = "free"

[[retention.tiers]]
name = "free"
days = 7

[[retention.tiers]]
name = "pro"
days = 90

# Uncomment to add more tiers:
# [[retention.tiers]]
# name = "team"
# days = 180
#
# [[retention.tiers]]
# name = "enterprise"
# days = 365

# ── CORS ─────────────────────────────────────────────────────────────────
# Allowed origins for browser requests.
# Empty = same-origin only (restrictive, recommended for production).
# ["*"] = allow all origins (not recommended).
[cors]
# allowed_origins = ["https://your-dashboard.example.com"]

# ── Pipeline ─────────────────────────────────────────────────────────────
[pipeline]
# batch_size = 64                  # max events per batch write (use 256 for high throughput)
# max_body_bytes = 10485760        # 10 MB max request body
# channel_capacity = 32768         # batch writer queue depth (raise for bursty traffic)
# strict_schema = false            # reject ingest events carrying request_body/response_body
                                    # with HTTP 400. default false: drop silently with a counter
                                    # (`keplor_dropped_field_total{field}`) and a rate-limited
                                    # warn so existing clients keep working. flip on once your
                                    # fleet has stopped sending those fields.
# write_timeout_secs = 10          # max wait per ingest write before returning 500.
                                    # bounds worst-case latency under back-pressure (range 1-300).

# ── Idempotency ──────────────────────────────────────────────────────────
[idempotency]
# enabled = true
# ttl_secs = 300                   # 5 min TTL for cached responses
# max_entries = 100000             # LRU cache capacity

# ── Rate limiting ────────────────────────────────────────────────────────
[rate_limit]
# enabled = false                  # set true to enable per-key limiting
# requests_per_second = 100.0
# burst = 200

# ── Event archival (optional, requires --features s3) ────────────────────
# Archive old events to S3/R2 as compressed JSONL files.
# Archived events are tombstoned in KeplorDB to keep the local data dir
# lean — segment GC reclaims the underlying space on the next sweep.
# Daily rollups are preserved and queryable regardless of archival.
# [archive]
# bucket = "keplor-archive"
# endpoint = "https://<account-id>.r2.cloudflarestorage.com"
# region = "auto"
# access_key_id = "your-access-key"
# secret_access_key = "your-secret-key"
# prefix = "events"
# path_style = false
# archive_after_days = 30           # archive events older than 30 days
# archive_after_hours = 0           # sub-day: archive events older than N hours (overrides days)
# archive_threshold_mb = 500        # or when the data dir exceeds 500 MB
# archive_batch_size = 10000        # events per JSONL file
# archive_interval_secs = 3600      # how often the archive loop runs (default: 1 hour)

# ── TLS (optional) ───────────────────────────────────────────────────────
# Uncomment to enable HTTPS. Both cert_path and key_path are required.
# [tls]
# cert_path = "/etc/keplor/tls/cert.pem"
# key_path  = "/etc/keplor/tls/key.pem"
