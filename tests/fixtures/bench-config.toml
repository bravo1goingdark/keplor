# Benchmark server configuration.
# Minimal config: auth disabled, tmpdir DB, no idempotency/rate-limiting.

[server]
listen_addr = "127.0.0.1:8080"
shutdown_timeout_secs = 5
request_timeout_secs = 10
max_connections = 1000

[storage]
db_path = "/tmp/keplor-bench.db"
retention_days = 0
wal_checkpoint_secs = 0
max_db_size_mb = 0
read_pool_size = 2

[auth]
api_keys = []

[pipeline]
batch_size = 256
max_body_bytes = 10485760

[idempotency]
enabled = false

[rate_limit]
enabled = false
