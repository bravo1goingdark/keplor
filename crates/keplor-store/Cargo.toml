[package]
name         = "keplor-store"
description  = "SQLite + content-addressed payload blob store with zstd compression."
version      = { workspace = true }
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
repository   = { workspace = true }
authors      = { workspace = true }
publish      = { workspace = true }

[lints]
workspace = true

[features]
default = ["batch"]
batch   = ["dep:tokio"]

[dependencies]
keplor-core = { path = "../keplor-core" }
bytes       = { workspace = true }
rusqlite    = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
sha2        = { workspace = true }
smol_str    = { version = "0.3", features = ["serde"] }
thiserror   = { workspace = true }
ulid        = { workspace = true }
http        = "1"
tracing     = { workspace = true }
zstd        = { workspace = true }
tokio       = { workspace = true, optional = true, features = ["sync", "time", "rt", "macros"] }

[dev-dependencies]
tokio     = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
rand      = "0.8"
criterion = { workspace = true }
dhat      = { workspace = true }

[[bench]]
name    = "store_bench"
harness = false

[[bench]]
name    = "dhat_batch"
harness = false
